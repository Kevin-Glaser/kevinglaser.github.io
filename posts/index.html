---
layout: default
title: Blog
permalink: /posts/
---

<style>
    .blog-header {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }

    .blog-header h1 {
        margin-bottom: 8px;
    }

    .blog-description {
        color: var(--text-secondary);
        font-size: 1.05em;
        margin: 0;
    }

    .post-list {
        display: flex;
        flex-direction: column;
    }

    .post-entry {
        padding: 20px 0;
        border-bottom: 1px solid var(--border);
        transition: padding-left 0.15s;
    }

    .post-entry:last-child {
        border-bottom: none;
    }

    .post-entry:hover {
        padding-left: 6px;
    }

    .post-entry a {
        text-decoration: none;
        color: inherit;
        display: block;
    }

    .post-entry:hover .entry-title {
        color: var(--accent);
    }

    .entry-title {
        font-size: 1.2em;
        font-weight: 600;
        margin-bottom: 6px;
        transition: color 0.15s;
    }

    .entry-description {
        color: var(--text-secondary);
        margin-bottom: 6px;
        font-size: 0.95em;
    }

    .entry-meta {
        color: var(--text-tertiary);
        font-size: 0.85em;
    }
</style>

<header class="blog-header">
    <h1>Blog</h1>
    <p class="blog-description">Technical write-ups and articles</p>
</header>

<div class="post-list">
    {% for post in site.posts %}
    <article class="post-entry">
        <a href="{{ post.url | prepend: site.baseurl }}">
            <h2 class="entry-title">{{ post.title }}</h2>
            {% if post.description %}
            <p class="entry-description">{{ post.description }}</p>
            {% endif %}
            <div class="entry-meta">{{ post.date | date: "%B %d, %Y" }}</div>
        </a>
    </article>
    {% endfor %}
</div>
