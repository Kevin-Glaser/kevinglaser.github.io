---
layout: default
title: Blog
permalink: /posts/
---

<style>
.post-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.post-entry {
    padding: 20px 0;
    border-bottom: 1px solid #e5e5e5;
    transition: all 0.2s;
}

.post-entry:last-child {
    border-bottom: none;
}

.post-entry:hover {
    padding-left: 8px;
}

.post-entry a {
    text-decoration: none;
    color: inherit;
    display: block;
}

.entry-header h2 {
    font-size: 1.3em;
    font-weight: 600;
    margin-bottom: 8px;
    color: #1a1a1a;
}

.post-entry:hover .entry-header h2 {
    color: #2563eb;
}

.entry-content {
    color: #666;
    margin-bottom: 8px;
    font-size: 0.95em;
}

.entry-footer {
    color: #999;
    font-size: 0.85em;
}
</style>

<div style="padding-top: 80px;">
    <header style="margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #e5e5e5;">
        <h1 style="font-size: 2em; font-weight: 700; margin-bottom: 8px;">Blog</h1>
        <p style="color: #666; font-size: 1.1em; margin: 0;">Technical write-ups and articles</p>
    </header>

    <div class="post-list">
        {% for post in site.posts %}
        <article class="post-entry">
            <a href="{{ post.url }}">
                <header class="entry-header">
                    <h2>{{ post.title }}</h2>
                </header>
                <div class="entry-content">
                    <p>{{ post.description }}</p>
                </div>
                <footer class="entry-footer">
                    {{ post.date | date: "%B %d, %Y" }}
                </footer>
            </a>
        </article>
        {% endfor %}
    </div>
</div>
