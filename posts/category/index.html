---
layout: default
title: Category
permalink: /posts/category/
---

<style>
    .category-header {
        margin-bottom: 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
    }

    .category-breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88em;
        color: var(--text-tertiary);
        margin-bottom: 16px;
    }

    .category-breadcrumb a {
        color: var(--text-tertiary);
        transition: color 0.15s;
    }

    .category-breadcrumb a:hover {
        color: var(--accent);
    }

    .category-breadcrumb .separator {
        color: var(--border);
    }

    .category-header h1 {
        margin-bottom: 6px;
    }

    .category-description {
        color: var(--text-secondary);
        font-size: 1.02em;
        margin: 0;
    }

    .post-list {
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .post-item {
        padding: 20px 0;
        border-bottom: 1px solid var(--border);
        transition: padding-left 0.15s ease;
    }

    .post-item:last-child {
        border-bottom: none;
    }

    .post-item:hover {
        padding-left: 10px;
    }

    .post-item a {
        text-decoration: none;
        color: inherit;
        display: block;
    }

    .post-item:hover .post-item-title {
        color: var(--accent);
    }

    .post-item-title {
        font-size: 1.1em;
        font-weight: 600;
        margin-bottom: 4px;
        transition: color 0.15s;
    }

    .post-item-desc {
        color: var(--text-secondary);
        font-size: 0.9em;
        margin-bottom: 4px;
        line-height: 1.5;
    }

    .post-item-meta {
        color: var(--text-tertiary);
        font-size: 0.82em;
    }

    .no-posts {
        color: var(--text-tertiary);
        font-size: 1em;
        padding: 40px 0;
        text-align: center;
    }
</style>

<div id="category-content"></div>

<script>
const siteBaseurl = {{ site.baseurl | jsonify }};
const allPosts = [
{% for post in site.posts %}
{
    title: {{ post.title | jsonify }},
    url: {{ post.url | prepend: site.baseurl | jsonify }},
    description: {{ post.description | jsonify }},
    date: {{ post.date | date: "%B %d, %Y" | jsonify }},
    path: {{ post.path | jsonify }}
}{% unless forloop.last %},{% endunless %}
{% endfor %}
];

const params = new URLSearchParams(window.location.search);
const cat = params.get('cat') || '';

const categories = {};
allPosts.forEach(function(post) {
    const parts = post.path.split('/');
    let c = 'Uncategorized';
    if (parts.length > 2 && parts[0] === '_posts') {
        c = parts[1];
    }
    if (!categories[c]) {
        categories[c] = [];
    }
    categories[c].push(post);
});

const container = document.getElementById('category-content');

if (cat && categories[cat]) {
    const catPosts = categories[cat];
    const catName = cat.charAt(0).toUpperCase() + cat.slice(1);

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML =
        '<div class="category-breadcrumb">' +
            '<a href="' + siteBaseurl + '/posts/">Blog</a>' +
            '<span class="separator">/</span>' +
            '<span>' + catName + '</span>' +
        '</div>' +
        '<h1>' + catName + '</h1>' +
        '<p class="category-description">Notes and articles about ' + cat.toLowerCase() + '. ' + catPosts.length + ' post' + (catPosts.length > 1 ? 's' : '') + '.</p>';

    const list = document.createElement('div');
    list.className = 'post-list';

    catPosts.forEach(function(post) {
        const item = document.createElement('article');
        item.className = 'post-item';
        item.innerHTML = '<a href="' + post.url + '">' +
            '<div class="post-item-title">' + post.title + '</div>' +
            (post.description ? '<div class="post-item-desc">' + post.description + '</div>' : '') +
            '<div class="post-item-meta">' + post.date + '</div>' +
            '</a>';
        list.appendChild(item);
    });

    container.appendChild(header);
    container.appendChild(list);

    document.title = catName + ' \u00B7 ' + document.title;
} else {
    container.innerHTML =
        '<div class="category-header">' +
            '<div class="category-breadcrumb">' +
                '<a href="' + siteBaseurl + '/posts/">Blog</a>' +
            '</div>' +
            '<h1>Category Not Found</h1>' +
            '<p class="category-description">The requested category does not exist.</p>' +
        '</div>' +
        '<p class="no-posts"><a href="' + siteBaseurl + '/posts/">Back to Blog</a></p>';
}
</script>
