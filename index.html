---
layout: default
title: Home
---

<style>
    .home {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .home-avatar {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 28px;
    }

    .home-name {
        font-size: 2.8em;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 12px;
        color: var(--text);
    }

    .home-tagline {
        font-size: 1.25em;
        color: var(--text-secondary);
        margin-bottom: 0;
    }

    .home-social {
        display: flex;
        gap: 20px;
        margin-top: 20px;
    }

    .home-social a {
        color: var(--text-secondary);
        transition: color 0.15s;
    }

    .home-social a:hover {
        color: var(--text);
    }

    .home-social svg {
        width: 26px;
        height: 26px;
        fill: currentColor;
    }

    .home-links {
        display: flex;
        gap: 28px;
        margin-top: 52px;
    }

    .home-links a {
        font-size: 1.1em;
        font-weight: 500;
        color: var(--text-secondary);
        padding: 10px 0;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
    }

    .home-links a:hover {
        color: var(--text);
        border-bottom-color: var(--text);
    }
</style>

<div class="home">
    <img src="{{ site.baseurl }}/assets/avatar.png" alt="Avatar" class="home-avatar">
    <h1 class="home-name">Kevin Glaser</h1>
    <p class="home-tagline">{{ site.description }}</p>
