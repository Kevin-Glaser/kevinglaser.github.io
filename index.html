---
layout: default
title: Home
---

<style>
    .home {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 20px;
    }

    .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background-color: #f5f5f5;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: #999;
    }

    .avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }

    .name {
        font-size: 2em;
        font-weight: 700;
        margin-bottom: 8px;
        color: #1a1a1a;
    }

    .bio {
        font-size: 1.1em;
        color: #666;
        margin-bottom: 0;
    }

    .buttons {
        display: flex;
        gap: 20px;
        margin-top: 60px;
    }

    .btn {
        padding: 14px 40px;
        font-size: 1em;
        font-weight: 500;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fff;
        color: #1a1a1a;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn:hover {
        border-color: #2563eb;
        color: #2563eb;
    }

    .btn-primary {
        background: #2563eb;
        color: #fff;
        border-color: #2563eb;
    }

    .btn-primary:hover {
        background: #1d4ed8;
        border-color: #1d4ed8;
        color: #fff;
    }
</style>

<div class="home">
    <div class="avatar">
        <img src="/assets/avatar.png" alt="Avatar" onerror="this.style.display='none'; this.parentElement.innerHTML='K';">
    </div>
    <h1 class="name">{{ site.title }}</h1>
    <p class="bio">{{ site.description }}</p>
    <div class="buttons">
        <a href="/posts/" class="btn btn-primary">Blog</a>
        <a href="/about/" class="btn">About</a>
    </div>
</div>
