---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} · {{ site.title }}</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --text-secondary: #555;
            --text-tertiary: #888;
            --border: #e0e0e0;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --code-bg: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.7;
            font-size: 17px;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--text); text-decoration: none; transition: color 0.15s; }
        a:hover { color: var(--accent); }

        .nav {
            width: 100%;
            padding: 48px 450px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            background-color: var(--bg);
            z-index: 100;
        }

        .nav-home {
            font-weight: 600;
            font-size: 1.15em;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            white-space: nowrap;
        }

        .nav-links a {
            font-size: 1em;
            color: var(--text-secondary);
            font-weight: 450;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .post-layout {
            display: flex;
            max-width: 1060px;
            margin: 0 auto;
            padding: 40px 20px 80px;
            flex: 1 0 auto;
            gap: 60px;
        }

        .toc {
            width: 220px;
            flex-shrink: 0;
            position: sticky;
            top: 100px;
            align-self: flex-start;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .toc-title {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .toc ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .toc li {
            margin-bottom: 6px;
        }

        .toc a {
            font-size: 0.88em;
            color: var(--text-tertiary);
            line-height: 1.4;
            display: block;
            padding: 2px 0;
            transition: color 0.15s;
        }

        .toc a:hover {
            color: var(--text);
        }

        .toc a.active {
            color: var(--accent);
            font-weight: 500;
        }

        .toc .toc-h3 {
            padding-left: 16px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px 80px;
            flex: 1 0 auto;
        }

        .container:has(.post-layout) {
            max-width: 100%;
            padding: 0;
        }

        .post-layout .container {
            max-width: 830px;
            margin: 0;
            padding: 0;
        }

        h1 { font-size: 1.8em; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; }
        h2 { font-size: 1.35em; font-weight: 600; margin: 32px 0 12px; letter-spacing: -0.01em; scroll-margin-top: 80px; }
        h3 { font-size: 1.1em; font-weight: 600; margin: 24px 0 8px; scroll-margin-top: 80px; }

        p { margin-bottom: 16px; color: var(--text-secondary); }

        ul, ol { margin: 12px 0 16px 20px; color: var(--text-secondary); }
        li { margin-bottom: 6px; }

        code { background-color: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
        pre { background-color: var(--code-bg); padding: 16px; border-radius: 6px; overflow-x: auto; margin: 16px 0; font-size: 0.9em; line-height: 1.5; }
        pre code { background: none; padding: 0; }

        blockquote { border-left: 3px solid var(--accent); padding-left: 16px; margin: 16px 0; color: var(--text-secondary); }

        hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        strong { font-weight: 600; color: var(--text); }

        .page-header {
            margin-bottom: 36px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .page-header h1 {
            margin-bottom: 6px;
        }

        .page-description {
            color: var(--text-secondary);
            font-size: 1.05em;
            margin: 0;
        }

        .post-header {
            margin-bottom: 36px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .post-header h1 {
            margin-bottom: 8px;
        }

        .post-meta {
            color: var(--text-tertiary);
            font-size: 0.9em;
        }

        .post-content h2 {
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        .back-link {
            display: inline-block;
            margin-top: 48px;
            color: var(--text-tertiary);
            font-size: 0.92em;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .footer {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px 40px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.85em;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="{{ site.baseurl }}/" class="nav-home">{{ site.title }}</a>
        <div class="nav-links">
            <a href="{{ site.baseurl }}/">Home</a>
            <a href="{{ site.baseurl }}/posts/">Blog</a>
            <a href="{{ site.baseurl }}/about/">About</a>
        </div>
    </nav>

    <div class="container">
        {{ content }}
    </div>

    <footer class="footer">
        &copy; {{ "now" | date: "%Y" }} {{ site.author }}
    </footer>

    <script>
    (function() {
        var toc = document.querySelector('.toc ul');
        if (!toc) return;
        var content = document.querySelector('.post-content');
        if (!content) return;
        var headings = content.querySelectorAll('h2, h3');
        if (headings.length === 0) return;

        headings.forEach(function(h, i) {
            var id = 'section-' + i;
            h.id = id;
            var li = document.createElement('li');
            var a = document.createElement('a');
            a.href = '#' + id;
            a.textContent = h.textContent;
            if (h.tagName === 'H3') li.className = 'toc-h3';
            li.appendChild(a);
            toc.appendChild(li);
        });

        var tocLinks = document.querySelectorAll('.toc a');
        function onScroll() {
            var scrollY = window.scrollY + 120;
            var current = -1;
            headings.forEach(function(h, i) {
                if (h.offsetTop <= scrollY) current = i;
            });
            tocLinks.forEach(function(a, i) {
                a.classList.toggle('active', i === current);
            });
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
    })();
    </script>
</body>
</html>
