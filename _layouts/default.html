<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e5e5e5;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
        a:hover { color: var(--text); }

        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            gap: 24px;
        }

        .nav a {
            font-size: 0.95em;
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 { font-size: 2em; font-weight: 600; margin-bottom: 10px; }
        h2 { font-size: 1.5em; font-weight: 600; margin: 30px 0 15px; }
        h3 { font-size: 1.2em; font-weight: 600; margin: 25px 0 10px; }

        .page-content {
            background-color: var(--bg);
            padding: 30px 0;
        }

        p { margin-bottom: 15px; color: var(--text-secondary); }
        ul, ol { margin: 15px 0 15px 25px; color: var(--text-secondary); }
        li { margin-bottom: 8px; }

        code { background-color: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        pre { background-color: #f5f5f5; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 15px 0; }
        pre code { background: none; padding: 0; }

        blockquote { border-left: 3px solid var(--accent); padding-left: 15px; margin: 15px 0; color: var(--text-secondary); }

        .social-links { display: flex; gap: 15px; margin: 20px 0; }
        .social-links a { color: var(--text-secondary); }
        .social-links a:hover { color: var(--accent); }

        .skill-tag {
            display: inline-block;
            background-color: #f5f5f5;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            margin: 4px;
            color: var(--text);
        }

        hr { border: none; border-top: 1px solid var(--border); margin: 30px 0; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/posts/">Blog</a>
        <a href="/about/">About</a>
    </nav>

    <div class="container">
        {{ content }}
    </div>
</body>
</html>
