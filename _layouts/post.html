---
layout: default
---

<div class="post-layout">
    <aside class="toc">
        <div class="toc-title">Contents</div>
        <ul></ul>
    </aside>
    <div class="container">
        <article>
            <header class="post-header">
                <h1>{{ page.title }}</h1>
                <div class="post-meta">
                    {{ page.date | date: "%B %d, %Y" }}
                    {% if page.tags %}· {{ page.tags | join: ", " }}{% endif %}
                </div>
            </header>

            <div class="post-content">
                {{ content }}
            </div>

            <a href="{{ site.baseurl }}/posts/" class="back-link">&larr; Back to Blog</a>
        </article>
    </div>
</div>
