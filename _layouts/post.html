---
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e5e5e5;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            gap: 24px;
        }

        .nav a {
            font-size: 0.95em;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .nav a:hover { color: var(--text); }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 20px 60px;
        }

        .post-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .post-title {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .post-meta {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .post-content {
            font-size: 1.05em;
        }

        .post-content h1 { font-size: 1.8em; font-weight: 700; margin: 30px 0 15px; }
        .post-content h2 { font-size: 1.4em; font-weight: 600; margin: 30px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .post-content h3 { font-size: 1.15em; font-weight: 600; margin: 25px 0 10px; }
        .post-content h4 { font-size: 1em; font-weight: 600; margin: 20px 0 8px; }

        .post-content p { margin-bottom: 18px; color: var(--text-secondary); }
        .post-content ul, .post-content ol { margin: 15px 0 15px 25px; color: var(--text-secondary); }
        .post-content li { margin-bottom: 8px; }

        .post-content code { background-color: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .post-content pre { background-color: #f5f5f5; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 20px 0; }
        .post-content pre code { background: none; padding: 0; }

        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 15px;
            margin: 20px 0;
            color: var(--text-secondary);
        }

        .post-content a { color: var(--accent); }
        .post-content a:hover { text-decoration: underline; }

        .back-link {
            display: inline-block;
            margin-top: 50px;
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">Home</a>
        <a href="/posts/">Blog</a>
        <a href="/about/">About</a>
    </nav>

    <div class="container">
        <article>
            <header class="post-header">
                <h1 class="post-title">{{ page.title }}</h1>
                <div class="post-meta">
                    {{ page.date | date: "%B %d, %Y" }}
                    {% if page.tags %}
                    | Tags: {{ page.tags | join: ", " }}
                    {% endif %}
                </div>
            </header>

            <div class="post-content">
                {{ content }}
            </div>

            <a href="/posts/" class="back-link">← Back to Blog</a>
        </article>
    </div>
</body>
</html>
