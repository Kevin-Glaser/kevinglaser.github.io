<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <style>
        :root {
            --bg: #1d1e20;
            --entry: #2e2e33;
            --primary: #dadada;
            --secondary: #9b9b9d;
            --tertiary: #414244;
            --content: #c4c4c5;
            --border: #333;
            --accent: #5c9aff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .nav {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .nav a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.95em;
        }

        .nav a:hover { color: var(--primary); }

        .post-header { margin-bottom: 30px; }

        .post-title {
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .post-meta {
            color: var(--secondary);
            font-size: 0.9em;
        }

        .post-content {
            background-color: var(--entry);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid var(--border);
        }

        .post-content h1 { font-size: 1.8em; margin: 25px 0 15px; }
        .post-content h2 { font-size: 1.5em; margin: 25px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .post-content h3 { font-size: 1.2em; margin: 20px 0 10px; }
        .post-content h4 { font-size: 1em; margin: 15px 0 8px; font-weight: 600; }

        .post-content p { margin-bottom: 15px; color: var(--content); }
        .post-content ul, .post-content ol { margin: 15px 0 15px 25px; color: var(--content); }
        .post-content li { margin-bottom: 8px; }

        .post-content code { background-color: var(--tertiary); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .post-content pre { background-color: var(--tertiary); padding: 15px; border-radius: 8px; overflow-x: auto; margin: 15px 0; }
        .post-content pre code { background: none; padding: 0; }

        .post-content blockquote { border-left: 4px solid var(--accent); padding-left: 15px; margin: 15px 0; color: var(--secondary); }

        .post-content a { color: var(--accent); }
        .post-content a:hover { text-decoration: underline; }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--secondary);
        }

        .back-link:hover { color: var(--primary); }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #fafafa;
                --entry: #f0f0f0;
                --primary: #333;
                --secondary: #666;
                --tertiary: #e0e0e0;
                --content: #555;
                --border: #ddd;
                --accent: #3b82f6;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">Home</a>
            <span style="color: var(--border); margin: 0 10px;">|</span>
            <a href="/posts/">Blog</a>
            <span style="color: var(--border); margin: 0 10px;">|</span>
            <a href="/about/">About</a>
        </nav>

        <article>
            <header class="post-header">
                <h1 class="post-title">{{ page.title }}</h1>
                <div class="post-meta">
                    {{ page.date | date: "%B %d, %Y" }}
                    {% if page.tags %}
                    | Tags: {{ page.tags | join: ", " }}
                    {% endif %}
                </div>
            </header>

            <div class="post-content">
                {{ content }}
            </div>

            <a href="/posts/" class="back-link">← Back to Blog</a>
        </article>
    </div>
</body>
</html>
